<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Happy Birthday conchoLy! 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ffecd2 100%);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
            transition: background 1s ease;
        }
        
        body.party-mode {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            animation: rainbow 5s ease infinite;
        }
        
        @keyframes rainbow {
            0% { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
            25% { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
            50% { background: linear-gradient(135deg, #d299c2 0%, #fef9d7 100%); }
            75% { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
            100% { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        }

        .container {
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 4em;
            color: #ff6b9d;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            margin: 30px 0;
            animation: bounce 2s infinite;
            font-weight: bold;
            letter-spacing: 5px;
        }

        .message {
            font-size: 1.5em;
            color: #ff8fab;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-weight: 600;
        }

        .dogs-container {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .dogs-container.show {
            opacity: 1;
        }

        .dog {
            position: absolute;
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
            pointer-events: auto;
            opacity: 0.6;
        }

        .dog:hover {
            transform: scale(1.3) rotate(10deg);
        }

        .dog:nth-child(1) { animation-delay: 0s; }
        .dog:nth-child(2) { animation-delay: 0.5s; }
        .dog:nth-child(3) { animation-delay: 1s; }
        .dog:nth-child(4) { animation-delay: 1.5s; }
        .dog:nth-child(5) { animation-delay: 2s; }
        .dog:nth-child(6) { animation-delay: 2.5s; }
        .dog:nth-child(7) { animation-delay: 0.3s; }
        .dog:nth-child(8) { animation-delay: 0.8s; }
        .dog:nth-child(9) { animation-delay: 1.2s; }
        .dog:nth-child(10) { animation-delay: 1.7s; }
        .dog:nth-child(11) { animation-delay: 2.2s; }
        .dog:nth-child(12) { animation-delay: 0.6s; }
        .dog:nth-child(13) { animation-delay: 1.4s; }
        .dog:nth-child(14) { animation-delay: 1.9s; }
        .dog:nth-child(15) { animation-delay: 2.4s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .balloons {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2;
        }

        .balloon {
            position: absolute;
            font-size: 50px;
            animation: rise 8s infinite ease-in;
        }

        @keyframes rise {
            0% {
                bottom: -100px;
                opacity: 1;
            }
            100% {
                bottom: 100%;
                opacity: 0;
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f0f;
            animation: confetti-fall 3s linear infinite;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        .confetti-burst {
            position: fixed;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes confetti-burst-left {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes confetti-burst-right {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) rotate(-720deg);
                opacity: 0;
            }
        }

        .cake {
            font-size: 100px;
            margin: 30px 0;
            animation: spin 4s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.9);
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 100;
            transition: transform 0.3s;
        }

        .music-control:hover {
            transform: scale(1.1);
        }

        .party-text {
            font-size: 2em;
            color: #ff6b9d;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin: 20px 0;
            animation: pulse 1.5s infinite;
            font-weight: bold;
        }

        .surprise-button {
            font-size: 2em;
            padding: 20px 50px;
            background: linear-gradient(135deg, #ff6b9d 0%, #feca57 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            transition: all 0.3s ease;
            margin: 30px 0;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .surprise-button:hover {
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6);
        }
        
        .surprise-button:active {
            transform: scale(0.95);
        }
        
        .hidden {
            display: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="balloons" id="balloons"></div>
    
    <div class="container">
        <h1>🎉 HAPPY BIRTHDAY CONCHOLY! 🎉</h1>
        
        <div class="cake">🎂</div>
        
        <div class="message">
            Wishing you a wonderful day filled with joy and happiness! 🎈
        </div>

        <button class="surprise-button" onclick="startParty()">
            🎁 Click for Surprise! �
        </button>

        <div class="party-text hidden" id="party-text">
            ✨ PARTY TIME! ✨
        </div>

        <div class="dogs-container" id="dogs-container"></div>

        <div class="message hidden" id="dog-message">
            🐶 Click on the dogs and flowers! 🌸
        </div>
    </div>

    <div class="music-control" onclick="toggleMusic()">
        <span id="music-icon">🎵 Play Music</span>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/02/07/audio_d1718ab41b.mp3" type="audio/mpeg">
    </audio>

    <script>
        let partyStarted = false;
        
        // Bắt đầu bữa tiệc - Yếu tố bất ngờ!
        function startParty() {
            if (partyStarted) return;
            partyStarted = true;
            
            // Ẩn nút surprise
            document.querySelector('.surprise-button').classList.add('hidden');
            
            // Hiện text party và chó
            document.getElementById('party-text').classList.remove('hidden');
            document.getElementById('dog-message').classList.remove('hidden');
            document.getElementById('dogs-container').classList.add('show');
            
            // Đổi nền sang chế độ party
            document.body.classList.add('party-mode');
            
            // Tạo chó
            createDogs();
            
            // Bắn confetti khổng lồ từ 2 bên
            setTimeout(() => {
                shootMassiveConfetti();
            }, 300);
            
            // Bật nhạc tự động
            setTimeout(() => {
                if (!musicPlaying) {
                    toggleMusic();
                }
            }, 500);
        }
        
        // Bắn confetti khổng lồ khi bắt đầu party
        function shootMassiveConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff6b6b', '#4ecdc4', '#45b7d1', '#ffa07a', '#98d8c8', '#f7dc6f'];
            const confettiCount = 50;
            
            for (let i = 0; i < confettiCount; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti-burst';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.left = '0px';
                    confetti.style.top = '50%';
                    
                    const tx = Math.random() * window.innerWidth * 0.8 + 200;
                    const ty = (Math.random() - 0.5) * window.innerHeight;
                    
                    confetti.style.setProperty('--tx', tx + 'px');
                    confetti.style.setProperty('--ty', ty + 'px');
                    confetti.style.animation = 'confetti-burst-left 2s ease-out forwards';
                    
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 2000);
                }, i * 15);
            }
            
            for (let i = 0; i < confettiCount; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti-burst';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.right = '0px';
                    confetti.style.top = '50%';
                    
                    const tx = -(Math.random() * window.innerWidth * 0.8 + 200);
                    const ty = (Math.random() - 0.5) * window.innerHeight;
                    
                    confetti.style.setProperty('--tx', tx + 'px');
                    confetti.style.setProperty('--ty', ty + 'px');
                    confetti.style.animation = 'confetti-burst-right 2s ease-out forwards';
                    
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 2000);
                }, i * 15);
            }
        }
        
        // Tạo chó và hoa ở vị trí ngẫu nhiên khắp màn hình
        function createDogs() {
            const dogsContainer = document.getElementById('dogs-container');
            const dogEmojis = ['🐶', '🐕', '🌸', '🌺', '🌻', '🌷', '🌹', '💐', '🌼', '🏵️', '🐶', '🐕', '🌸', '🌺', '🌻'];
            
            dogEmojis.forEach((emoji, index) => {
                const dog = document.createElement('div');
                dog.className = 'dog';
                dog.textContent = emoji;
                
                const randomTop = Math.random() * 80 + 10;
                const randomLeft = Math.random() * 80 + 10;
                
                dog.style.top = randomTop + '%';
                dog.style.left = randomLeft + '%';
                
                dog.onclick = function(e) {
                    if (emoji === '🐶' || emoji === '🐕') {
                        bark();
                    }
                    shootConfetti(e.clientX, e.clientY);
                };
                
                dogsContainer.appendChild(dog);
            });
        }

        // Bắn confetti từ 2 bên màn hình
        function shootConfetti(clickX, clickY) {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff6b6b', '#4ecdc4', '#45b7d1', '#ffa07a', '#98d8c8', '#f7dc6f'];
            const confettiCount = 30;
            
            for (let i = 0; i < confettiCount; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti-burst';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.left = '0px';
                    confetti.style.top = '50%';
                    
                    const tx = Math.random() * window.innerWidth * 0.6 + 200;
                    const ty = (Math.random() - 0.5) * window.innerHeight;
                    
                    confetti.style.setProperty('--tx', tx + 'px');
                    confetti.style.setProperty('--ty', ty + 'px');
                    confetti.style.animation = 'confetti-burst-left 1.5s ease-out forwards';
                    
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 1500);
                }, i * 20);
            }
            
            for (let i = 0; i < confettiCount; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti-burst';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.right = '0px';
                    confetti.style.top = '50%';
                    
                    const tx = -(Math.random() * window.innerWidth * 0.6 + 200);
                    const ty = (Math.random() - 0.5) * window.innerHeight;
                    
                    confetti.style.setProperty('--tx', tx + 'px');
                    confetti.style.setProperty('--ty', ty + 'px');
                    confetti.style.animation = 'confetti-burst-right 1.5s ease-out forwards';
                    
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 1500);
                }, i * 20);
            }
        }

        // Tạo bóng bay
        function createBalloons() {
            if (!partyStarted) return;
            const balloons = document.getElementById('balloons');
            const balloonEmojis = ['🎈', '🎉', '🎊', '🎁', '⭐', '✨', '💝', '🌟'];
            
            setInterval(() => {
                if (!partyStarted) return;
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.textContent = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
                balloon.style.left = Math.random() * 100 + '%';
                balloon.style.animationDuration = (Math.random() * 3 + 5) + 's';
                balloons.appendChild(balloon);
                
                setTimeout(() => {
                    balloon.remove();
                }, 8000);
            }, 500);
        }

        // Tạo confetti rơi xuống
        function createConfetti() {
            if (!partyStarted) return;
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            
            setInterval(() => {
                if (!partyStarted) return;
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, 3000);
            }, 100);
        }

        // Tiếng chó sủa
        function bark() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 200 + Math.random() * 200;
            oscillator.type = 'sawtooth';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }

        // Điều khiển nhạc nền
        let musicPlaying = false;
        const bgMusic = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('music-icon');

        function toggleMusic() {
            if (musicPlaying) {
                bgMusic.pause();
                musicIcon.textContent = '🎵 Play Music';
                musicPlaying = false;
            } else {
                bgMusic.play();
                musicIcon.textContent = '🔇 Mute Music';
                musicPlaying = true;
            }
        }

        // Khởi động hiệu ứng sau khi party bắt đầu
        setTimeout(() => {
            createBalloons();
            createConfetti();
        }, 1000);
    </script>
</body>
</html>
